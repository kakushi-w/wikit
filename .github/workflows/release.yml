# Builds wikit for all platforms and publishes them as a GitHub Release whenever
# a version tag (e.g. v1.2.3) is pushed. Users then upgrade with `wikit update`.
#
# Set REPO below (or rely on github.repository) so the built binaries know where
# to check for their own updates.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build all platforms
        working-directory: wikit-go
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.version=${TAG} -X main.updateRepo=${REPO}"
          build() {
            local goos=$1 goarch=$2 out=$3
            echo "building $out"
            GOOS=$goos GOARCH=$goarch go build -ldflags "$LDFLAGS" -o "dist/$out" ./cmd/wikit
          }
          build windows amd64 wikit-windows-amd64.exe
          build linux   amd64 wikit-linux-amd64
          build linux   arm64 wikit-linux-arm64
          build darwin  amd64 wikit-darwin-amd64
          build darwin  arm64 wikit-darwin-arm64
          cd dist && sha256sum * > SHA256SUMS && cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wikit-go/dist/wikit-*
            wikit-go/dist/SHA256SUMS
